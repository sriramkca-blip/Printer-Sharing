name: Build C# Executable

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Build Solution
      run: msbuild PrinterSharing.sln /p:Configuration=Release

    - name: Upload Executable
      uses: actions/upload-artifact@v4
      with:
        name: PrinterSharing-Executable
        path: PrinterSharing/bin/Release/
